name: Upload Release Asset
on:
  schedule:
    #      M H - - D => 06:00 of Monday 
  - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            flags: '-b RelWithDebInfo -e OFF'
          - os: windows-latest
            flags: '-b RelWithDebInfo -e OFF'
          - os: macos-latest
            flags: '-b RelWithDebInfo -e OFF -c 21'
    uses: ./.github/workflows/build.yml
    with:
      operating-system: ${{ matrix.os }}
      build-flags: ${{ matrix.flags }}
      testing: false

  build-linux-arm64:
    name: Homebrew compatibility check (Linux ARM64, LLVM 22)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM 22
        run: |
          wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22 clang-22 libclang-22-dev libclang-cpp22-dev
      - name: Build ESBMC
        run: ./scripts/build.sh -b RelWithDebInfo -S OFF -c 22 -e OFF

  build-info:
    uses: ./.github/workflows/build-info.yml

  create-release:
    name: Upload Release Asset
    runs-on: ubuntu-24.04
    needs: [build, build-info]
    steps:
      - name: Download Linux Build
        uses: actions/download-artifact@v8
        with:
          name: 'release-ubuntu-24.04--b RelWithDebInfo -e OFF'
          path: ./linux-release
      - name: Create Linux Release file
        run: zip -r esbmc-linux.zip ./linux-release
      - name: Download Windows Build
        uses: actions/download-artifact@v8
        with:
          name: release-windows-latest
          path: ./windows-release
      - name: Create Windows Release file
        run: zip -r esbmc-windows.zip ./windows-release
      - name: Download macOS Build
        uses: actions/download-artifact@v4
        with:
          name: 'release-macos-latest--b RelWithDebInfo -e OFF -c 21'
          path: ./macos-release
      - name: Create macOS Release file
        run: zip -r esbmc-macos.zip ./macos-release
      - name: Download Info Manual
        uses: actions/download-artifact@v8
        with:
          name: esbmc-info-manual
          path: .
      - name: Get files
        run: ls
      - name: Do the release
        uses: softprops/action-gh-release@v3
        with:
          name: 'ESBMC Weekly Pre-release'
          body: 'This is an automated weekly pre-release of ESBMC. Please report any bugs to our [Issues](https://github.com/esbmc/esbmc/issues) tracking page.'
          tag_name: weekly
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: |
            esbmc-linux.zip
            esbmc-windows.zip
            esbmc-macos.zip
            esbmc.info
