name: Doxygen API docs

# Validates that the doxygen API reference still builds. On master this checks
# the docs the website deploys (esbmc/esbmc.github.io -> /docs/api); on pull
# requests it only runs when the docs config or build script changes, since a
# full build on every src/ PR is costly and cannot fail on doc-comment issues
# (warnings are not treated as errors). The public deploy is performed by the
# esbmc.github.io pages workflow, which runs scripts/gen-docs.sh against this
# repository.

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - '.doxygen'
      - 'scripts/gen-docs.sh'
      - '.github/workflows/doxygen.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doxygen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate API documentation
        run: scripts/gen-docs.sh

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: doxygen-html
          path: docs/html
          if-no-files-found: error
