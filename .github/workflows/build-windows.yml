
on:
  workflow_call:
    inputs:
      operating-system:
        description: "Targeted OS (e.g. ubuntu-latest, windows-latest)"
        required: true
        type: string
      build-flags:
        description: "Flags to be passed to build.sh script"
        required: true
        type: string
      testing:
        description: "Whether to run tests (regression) for this build"
        required: true
        type: boolean

jobs:
  build:
    name: Build ESBMC (${{ inputs.operating-system }})
    runs-on: ${{ inputs.operating-system }}
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.9
    - name: check python
      run: python --version
    - name: Update vcpkg
      run: |
        vcpkg.exe update
        cd C:/vcpkg
        git.exe checkout 2025.03.19
        .\bootstrap-vcpkg.bat
    - name: Make git use LF only
      run: |
        git config --system core.autocrlf false
        git config --system core.eol lf
    - uses: actions/checkout@v4
    - name: Configure ESBMC
      run: ./scripts/build.ps1
    - uses: actions/upload-artifact@v4
      with:
        name: release-windows-latest
        path: C:/deps/esbmc
    - name: Run Tests
      if: ${{ inputs.testing == true }}
      run: |
        cd build
        # Windows PR: only the platform-portable C core (regression/esbmc) and
        # regression/floats, the floating-point semantics suite. Linux already
        # exercises the full regression suite on every PR; running it again on
        # Windows mostly costs runner time. Tests genuinely Windows-specific
        # (path handling, line endings, Clang frontend) live inside esbmc/.
        # On push events, run everything.
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          ctest -j4 --output-on-failure --progress -L 'esbmc/|floats/' . -C RelWithDebInfo
        else
          ctest -j4 --output-on-failure --progress . -C RelWithDebInfo
        fi
      shell: bash
