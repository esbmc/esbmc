name: PR

on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check testing tool suite
  testing-tool:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - name: Runs testing tool unit test
      run: cd regression && python3 testing_tool_test.py

  build-ubuntu:
    uses: ./.github/workflows/build-unix.yml
    name: static llvm-22 DebugOpt
    with:
      operating-system: ubuntu-24.04
      build-flags: '-b DebugOpt -e ON'
      testing: true

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    name: static llvm-22 DebugOpt
    with:
      operating-system: windows-latest
      build-flags: '-b DebugOpt -e ON'
      testing: true

  build-macos-arm:
    uses: ./.github/workflows/build-unix.yml
    name: arm64 darwin build
    with:
      operating-system: macos-latest
      build-flags: '-b DebugOpt -c 21'
      testing: true

  # Check project with clang-format. This job no longer auto-commits fixes:
  # it only *checks* that the lines changed in the PR are formatted, and on
  # failure posts a comment explaining how to fix the already-committed lines
  # (scripts/install-format-hook.sh --fix) and how to install the local
  # pre-commit hook that prevents the failure next time.
  code-style:
    name: Check C/C++ code-style
    runs-on: ubuntu-slim
    permissions:
      # Read code; write only PR comments (no push / auto-commit).
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install libtinfo-dev
    - name: Download Clang 11
      run: wget https://github.com/llvm/llvm-project/releases/download/llvmorg-11.0.0/clang+llvm-11.0.0-x86_64-linux-gnu-ubuntu-20.04.tar.xz
    - name: Extract Clang 11
      run: tar xf clang+llvm-11.0.0-x86_64-linux-gnu-ubuntu-20.04.tar.xz && mv clang+llvm-11.0.0-x86_64-linux-gnu-ubuntu-20.04 clang
    - name: Check formatting of changed lines
      id: fmt
      shell: bash
      run: |
        mapfile -t files < <(
          git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- src unit |
          grep -E '\.(h|c|cpp|hpp|hh)$' |
          grep -v '^src/ansi-c/cpp/' |
          grep -v '^src/clang-c-frontend/headers/' |
          grep -v '^src/c2goto/library/libm/musl/' || true
        )

        if [ "${#files[@]}" -eq 0 ]; then
          echo "No changed C/C++ files to format."
          exit 0
        fi

        # Format only the lines that differ from the base branch (not whole
        # files) and emit a diff instead of editing. A non-empty diff means
        # the PR touched lines that are not clang-format-11-clean.
        diff=$(python3 ./clang/bin/git-clang-format \
          --binary ./clang/bin/clang-format \
          --style file \
          --extensions h,c,cpp,hpp,hh \
          --diff \
          "origin/${{ github.base_ref }}" -- "${files[@]}")

        # git-clang-format prints these sentinels when nothing needs changing.
        if [ -z "$diff" ] || \
           [ "$diff" = "no modified files to format" ] || \
           [ "$diff" = "clang-format did not modify any files" ]; then
          echo "Changed lines are clang-format clean."
          exit 0
        fi

        echo "::error::Changed lines are not clang-format-11 clean."
        echo "$diff"
        {
          echo "diff<<DIFF_EOF"
          echo "$diff"
          echo "DIFF_EOF"
        } >> "$GITHUB_OUTPUT"
        exit 1
    - name: Comment with fix instructions
      if: ${{ failure() && steps.fmt.outcome == 'failure' && github.event.pull_request.head.repo.full_name == github.repository }}
      uses: actions/github-script@v7
      with:
        script: |
          const marker = '<!-- esbmc-clang-format-check -->';
          const diff = process.env.FMT_DIFF || '';
          const truncated = diff.length > 60000
            ? diff.slice(0, 60000) + '\n... (diff truncated) ...'
            : diff;
          const base = context.payload.pull_request.base.ref;
          const body = [
            marker,
            '### Code style check failed',
            '',
            'Some lines changed in this PR are not formatted with **clang-format 11**.',
            '',
            '**Fix the lines already committed** — reformat the changed lines with the same clang-format 11 CI uses, then commit and push:',
            '',
            '```sh',
            './scripts/install-format-hook.sh --fix origin/' + base,
            'git add -u && git commit -m "apply clang-format" && git push',
            '```',
            '',
            '**Avoid this next time** — install the pre-commit hook once; it formats changed lines automatically on every future commit:',
            '',
            '```sh',
            './scripts/install-format-hook.sh',
            '```',
            '',
            '<details><summary>Required formatting diff</summary>',
            '',
            '```diff',
            truncated,
            '```',
            '',
            '</details>',
          ].join('\n');

          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.paginate(
            github.rest.issues.listComments,
            { owner, repo, issue_number });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment(
              { owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment(
              { owner, repo, issue_number, body });
          }
      env:
        FMT_DIFF: ${{ steps.fmt.outputs.diff }}
    - name: Delete downloaded Clang 11
      if: always()
      run: rm -rf clang*


  # Check CMake files with cmakelint
  cmake-lint:
    name: Check CMake style (cmakelint)
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install cmakelint
        run: pip install cmakelint
      - name: Run cmakelint on tracked CMake files
        shell: bash
        run: |
          mapfile -t files < <(
            git ls-files '*.cmake' 'CMakeLists.txt' '**/CMakeLists.txt' '**/*.cmake'
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No CMake files to lint."
            exit 0
          fi
          cmakelint --config=.cmakelintrc "${files[@]}"


  # Check project with YAPF
  python-style:
      name: Check Python code style (YAPF)
      runs-on: ubuntu-slim
      permissions:
        contents: write
      steps:
        - name: Checkout PR branch (not merge ref)
          uses: actions/checkout@v6
          with:
            ref: ${{ github.event.pull_request.head.sha }}
            fetch-depth: 0
            persist-credentials: true

        - name: Set up Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.10'

        - name: Install YAPF
          run: pip install yapf

        - name: Apply YAPF formatting on changed files
          shell: bash
          run: |
            mapfile -t files < <(
              git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- src/python-frontend regression/python |
              grep -E '\.py$' || true
            )

            if [ "${#files[@]}" -eq 0 ]; then
              echo "No changed Python files to format."
              exit 0
            fi

            yapf --in-place "${files[@]}"

        - name: Auto-commit formatting changes
          uses: stefanzweifel/git-auto-commit-action@v7
          if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          with:
            commit_message: 'style(python): apply YAPF auto-formatting'
            file_pattern: |
              src/python-frontend/**/*.py
              regression/**/*.py
            commit_user_name: 'github-actions'
            commit_user_email: 'github-actions@github.com'
            skip_fetch: true
            skip_checkout: true

        - name: Throw error if changes were made (for forks)
          run: git diff --exit-code --ignore-cr-at-eol
          if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}

  coverage:
    name: Build and upload coverage to Codecov
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies and build with coverage
        env:
          LLVM_PROFILE_FILE: "/tmp/esbmc-coverage/coverage-%m.profraw"
        run: ./scripts/build.sh -b Debug -k ON
      - name: Run tests
        env:
          LLVM_PROFILE_FILE: "/tmp/esbmc-coverage/coverage-%m.profraw"
        run: mkdir -p build/coverage && cd build/ && ctest -j4 --progress . || true
      - name: Merge coverage data
        run: llvm-profdata merge -sparse /tmp/esbmc-coverage/*.profraw -o build/merged.profdata
      - name: Generate lcov coverage report
        run: |
          llvm-cov export -format=lcov \
            -instr-profile=build/merged.profdata \
            build/src/esbmc/esbmc \
            > coverage.info
      - name: Filter out uninteresting paths
        run: |
          lcov --ignore-errors inconsistent --ignore-errors corrupt \
               --ignore-errors unused --remove coverage.info \
               '/usr/*' \
               '*/build/*' \
               --output-file coverage.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
      - name: Save coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.info
          retention-days: 5    
