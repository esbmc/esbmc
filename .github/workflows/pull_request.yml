name: PR

on: [pull_request]

jobs:
  # Check testing tool suite
  testing-tool:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v4
    - name: Runs testing tool unit test
      run: cd regression && python3 testing_tool_test.py

  build-ubuntu:
    uses: ./.github/workflows/build-unix.yml
    name: static llvm-21 DebugOpt
    with:
      operating-system: ubuntu-24.04
      build-flags: '-b DebugOpt -e ON'
      testing: true

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    name: static llvm-22 DebugOpt
    with:
      operating-system: windows-latest
      build-flags: '-b DebugOpt -e ON'
      testing: true

  build-macos-arm:
    uses: ./.github/workflows/build-unix.yml
    name: arm64 darwin build
    with:
      operating-system: macos-latest
      build-flags: '-b DebugOpt -c 21'
      testing: true

  # Check project with clang-format
  code-style:
    name: Check C/C++ code-style
    runs-on: ubuntu-slim
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install libtinfo-dev
    - name: Download Clang 11
      run: wget https://github.com/llvm/llvm-project/releases/download/llvmorg-11.0.0/clang+llvm-11.0.0-x86_64-linux-gnu-ubuntu-20.04.tar.xz
    - name: Extract Clang 11
      run: tar xf clang+llvm-11.0.0-x86_64-linux-gnu-ubuntu-20.04.tar.xz && mv clang+llvm-11.0.0-x86_64-linux-gnu-ubuntu-20.04 clang
    - name: Run clang-format on changed files
      shell: bash
      run: |
        mapfile -t files < <(
          git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- src unit |
          grep -E '\.(h|c|cpp|hpp|hh)$' |
          grep -v '^src/ansi-c/cpp/' |
          grep -v '^src/clang-c-frontend/headers/' |
          grep -v '^src/c2goto/library/libm/musl/' || true
        )

        if [ "${#files[@]}" -eq 0 ]; then
          echo "No changed C/C++ files to format."
          exit 0
        fi

        ./clang/bin/clang-format -style=file -i -fallback-style=none "${files[@]}"
    - name: Delete downloaded Clang 11
      run: rm -rf clang*
    # Commit all changed files back to the repository
    - uses: stefanzweifel/git-auto-commit-action@v5
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    - name: Throws error if changes were made
      run: git diff --exit-code --ignore-cr-at-eol
      if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}


  # Check project with YAPF
  python-style:
      name: Check Python code style (YAPF)
      runs-on: ubuntu-slim
      permissions:
        contents: write
      steps:
        - name: Checkout PR branch (not merge ref)
          uses: actions/checkout@v4
          with:
            ref: ${{ github.event.pull_request.head.sha }}
            fetch-depth: 0
            persist-credentials: true

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'

        - name: Install YAPF
          run: pip install yapf

        - name: Apply YAPF formatting on changed files
          shell: bash
          run: |
            mapfile -t files < <(
              git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- src/python-frontend regression/python |
              grep -E '\.py$' || true
            )

            if [ "${#files[@]}" -eq 0 ]; then
              echo "No changed Python files to format."
              exit 0
            fi

            yapf --in-place "${files[@]}"

        - name: Auto-commit formatting changes
          uses: stefanzweifel/git-auto-commit-action@v5
          if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          with:
            commit_message: 'style(python): apply YAPF auto-formatting'
            file_pattern: |
              src/python-frontend/**/*.py
              regression/**/*.py
            commit_user_name: 'github-actions'
            commit_user_email: 'github-actions@github.com'
            skip_fetch: true
            skip_checkout: true

        - name: Throw error if changes were made (for forks)
          run: git diff --exit-code --ignore-cr-at-eol
          if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}

  coverage:
    name: Build and upload coverage to Codecov
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies and build with coverage
        env:
          LLVM_PROFILE_FILE: "/tmp/esbmc-coverage/coverage-%m.profraw"
        run: ./scripts/build.sh -b Debug -k ON
      - name: Run tests
        env:
          LLVM_PROFILE_FILE: "/tmp/esbmc-coverage/coverage-%m.profraw"
        run: mkdir -p build/coverage && cd build/ && ctest -j4 --progress . || true
      - name: Merge coverage data
        run: llvm-profdata merge -sparse /tmp/esbmc-coverage/*.profraw -o build/merged.profdata
      - name: Generate lcov coverage report
        run: |
          llvm-cov export -format=lcov \
            -instr-profile=build/merged.profdata \
            build/src/esbmc/esbmc \
            > coverage.info
      - name: Filter out uninteresting paths
        run: |
          lcov --ignore-errors inconsistent --ignore-errors corrupt \
               --ignore-errors unused --remove coverage.info \
               '/usr/*' \
               '*/build/*' \
               --output-file coverage.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
      - name: Save coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info
          retention-days: 5    
