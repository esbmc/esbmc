
on:
  workflow_call:
    inputs:
      operating-system:
        description: "Targeted OS (e.g. ubuntu-latest, windows-latest)"
        required: true
        type: string
      build-flags:
        description: "Flags to be passed to build.sh script"
        required: true
        type: string
      testing:
        description: "Whether to run tests (regression) for this build"
        required: true
        type: boolean
      canon-names:
        description: "Upload the build as a canonical esbmc-<platform>.zip release asset"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ESBMC (${{ inputs.operating-system }})
    runs-on: ${{ inputs.operating-system }}
    steps:
    - uses: actions/checkout@v6

    - name: Build ESBMC
      run: ./scripts/build.sh ${{ inputs.build-flags }}

    # Default: upload the raw ./release folder under the flag-qualified name that
    # downstream jobs (benchexec, sv-comp, witness-validation) download verbatim.
    - name: Upload build artifact
      if: ${{ !inputs.canon-names }}
      uses: actions/upload-artifact@v7
      with:
        name: release-${{ inputs.operating-system }}-${{ inputs.build-flags }}
        path: ./release

    # Release pipeline (canon-names): emit a canonical esbmc-<platform>.zip so the
    # published asset resolves to releases/latest/download/esbmc-<platform>.zip.
    - name: Package canonical release asset
      if: ${{ inputs.canon-names }}
      run: |
        case "${{ inputs.operating-system }}" in
          ubuntu*) platform=linux ;;
          macos*)  platform=macos ;;
          *)       platform="${{ inputs.operating-system }}" ;;
        esac
        echo "PLATFORM=$platform" >> "$GITHUB_ENV"
        zip -r "esbmc-$platform.zip" ./release
    - name: Upload canonical release asset
      if: ${{ inputs.canon-names }}
      uses: actions/upload-artifact@v7
      with:
        name: esbmc-${{ env.PLATFORM }}
        path: esbmc-${{ env.PLATFORM }}.zip
    
    - name: Check Python regression tests
      if: ${{ inputs.testing == true }}
      run: |
        # Set PATH to include Python 3.12 and user-installed tools (mypy, meson, etc.)
        export PATH="$(brew --prefix python@3.12)/bin:$HOME/Library/Python/3.12/bin:$PATH"
        chmod +x scripts/check_python_tests.sh
        ./scripts/check_python_tests.sh

    - name: Run tests
      if: ${{ inputs.testing == true }}
      run: |
        # Set PATH to include Python 3.12 and user-installed tools (mypy, meson, etc.)
        export PATH="$(brew --prefix python@3.12)/bin:$HOME/Library/Python/3.12/bin:$PATH"
        cd build/
        # Cap the per-test TIMEOUT property at 120s. ctest --timeout is ignored
        # when tests set TIMEOUT via set_tests_properties (regression/CMakeLists.txt),
        # so we override the cache variable that feeds it and reconfigure.
        cmake -DESBMC_REGRESS_TIMEOUT=120 .
        # macOS PR: only the python/ suite (anchored — excludes python-intensive
        # and python-coverage, which already run on Linux). The Python frontend is
        # the one part of ESBMC whose toolchain materially differs across OSes
        # (Homebrew Python, stdlib paths); the rest of the regression suite is
        # platform-portable and covered by the Linux PR job.
        # On PR Linux, skip python-intensive to keep fast feedback.
        # On other systems/events (push, dispatch), run everything.
        #
        # The Linux legs run the full esbmc-cpp suite, which contains
        # memory-heavy container/string cases (e.g. unordered_map/copy_move_fail
        # peaks ~8GB, map/multimap _string_class-2_bug ~3GB each). Under -j4 on a
        # 16GB runner these can align and exhaust RAM, ending the job with a
        # "runner received a shutdown signal" (OOM). Run the Linux legs with -j2
        # to bound peak concurrent memory. The macOS leg runs only the light
        # python/ suite and keeps -j4.
        if [[ "${{ inputs.operating-system }}" =~ ^macos ]]; then
          ctest -j4 --output-on-failure --progress -L '^python/$'
        elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
          ctest -j2 --output-on-failure --progress -LE python-intensive .
        else
          ctest -j2 --output-on-failure --progress .
        fi
