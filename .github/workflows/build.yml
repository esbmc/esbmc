name: Build ESBMC

on:
    # Sadly, there is no way to share the inputs between workflow_dispatch and workflow_call
    workflow_dispatch:
      inputs:
        operating-system:
            description: "Targeted OS (e.g. ubuntu-latest, windows-latest)"
            required: true
            type: string
        build-flags:
            description: "Flags to be passed to build.sh script"
            required: true
            type: string
        testing:
            description: "Whether to run tests (regression) for this build"
            required: true
            type: boolean
        canon-names:
            description: "Upload the build as a canonical esbmc-<platform>.zip release asset"
            required: false
            default: false
            type: boolean
    workflow_call:
      inputs:
        operating-system:
            description: "Targeted OS (e.g. ubuntu-latest, windows-latest)"
            required: true
            type: string
        build-flags:
            description: "Flags to be passed to build.sh script"
            required: true
            type: string
        testing:
            description: "Whether to run tests (regression) for this build"
            required: true
            type: boolean
        canon-names:
            description: "Upload the build as a canonical esbmc-<platform>.zip release asset"
            required: false
            default: false
            type: boolean

jobs:
  build-unix:
    if: ${{ !startsWith(inputs.operating-system, 'windows-') }}
    uses: ./.github/workflows/build-unix.yml
    with:
      operating-system: ${{ inputs.operating-system }}
      build-flags: ${{ inputs.build-flags }}
      testing: ${{ inputs.testing }}
      canon-names: ${{ inputs.canon-names }}

  build-windows:
    if: ${{ startsWith(inputs.operating-system, 'windows-') }}
    uses: ./.github/workflows/build-windows.yml
    with:
      operating-system: ${{ inputs.operating-system }}
      build-flags: ${{ inputs.build-flags }}
      testing: ${{ inputs.testing }}
      canon-names: ${{ inputs.canon-names }}
