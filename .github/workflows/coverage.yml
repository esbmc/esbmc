name: Coverage
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  coverage:
    name: Build and upload coverage to Codecov
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies and build with coverage
        run: ./scripts/build.sh -b Debug -k ON
      - name: Run tests
        env:
          LLVM_PROFILE_FILE: "coverage/%p.profraw"
        run: mkdir -p build/coverage && cd build/ && ctest -j4 --output-on-failure --progress --timeout 5 . || true
      - name: Merge coverage data
        run: |
          if ls build/coverage/*.profraw 1> /dev/null 2>&1; then
            llvm-profdata merge -sparse build/coverage/*.profraw -o build/merged.profdata
          else
            echo "No .profraw files found in build/coverage; skipping llvm-profdata merge."
          fi
      - name: Generate lcov coverage report
        run: |
          llvm-cov export -format=lcov \
            -instr-profile=build/merged.profdata \
            build/src/esbmc/esbmc \
            > coverage.info
      - name: Filter out uninteresting paths
        run: |
          lcov --remove coverage.info \
               '/usr/*' \
               '*/build/*' \
               '*/unit/*' \
               '*/src/ansi-c/cpp/*' \
               '*/src/clang-c-frontend/headers/*' \
               '*/src/c2goto/library/libm/musl/*' \
               --output-file coverage.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
