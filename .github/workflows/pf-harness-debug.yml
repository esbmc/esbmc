name: pf-harness-debug

on:
  push:
    branches: [ 'debug/pf-harness' ]
  workflow_dispatch:

jobs:
  harness:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Toolchain
        run: |
          g++ --version || true
          ldd --version | head -1 || true
      - name: Fetch nlohmann/json single header
        run: |
          mkdir -p third_party/nlohmann
          curl -sSL https://raw.githubusercontent.com/nlohmann/json/v3.11.3/single_include/nlohmann/json.hpp -o third_party/nlohmann/json.hpp
      - name: Compile and run harness (multiple configs)
        run: |
          set +e
          run() { echo "==================== $1 ===================="; shift; "$@" -Ithird_party tools/pf_harness.cpp -o /tmp/h 2>/tmp/e || { echo COMPILE_FAIL; cat /tmp/e; return; }; /tmp/h; echo "exit=$?"; }
          run "g++ -O2"            g++     -std=c++17 -O2 -g
          run "g++ -O2 asan+ubsan" g++     -std=c++17 -O2 -g -fsanitize=address,undefined -fno-omit-frame-pointer
          run "clang++ -O2"        clang++ -std=c++17 -O2 -g
          echo "==================== done ===================="
