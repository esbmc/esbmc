name: sv-comp-stats-refresh

on:
  schedule:
    - cron: '0 4 1 */3 *'
  workflow_dispatch:
    inputs:
      svbenchmarks:
        description: 'sv-benchmarks ref'
        required: true
        default: 'main'

concurrency:
  group: sv-comp-stats-refresh
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      operating-system: ubuntu-24.04
      build-flags: '-b Release -e OFF -C'
      testing: false

  run:
    runs-on: ['self-hosted', 'Linux', 'x64', 'benchexec']
    needs: build
    timeout-minutes: 20000
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - budget: 30
            file: stats-30s.txt
          - budget: 100
            file: stats-100s
          - budget: 300
            file: stats-300s.txt
          - budget: 600
            file: stats-600s.txt
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: esbmc-src
      - name: Setup SV-Benchmarks
        # On `schedule`, inputs.* resolves to empty string, so `|| 'main'`
        # picks the default. Keep this explicit — a naive "simplification"
        # would break scheduled runs.
        run: |
          cd $HOME/sv-benchmarks
          git fetch --all --tags --force
          git checkout ${{ inputs.svbenchmarks || 'main' }}
          if [ "${{ inputs.svbenchmarks || 'main' }}" = "main" ]; then
            git reset --hard origin/main
          fi
      - uses: actions/download-artifact@v8.0.1
        with:
          name: 'release-ubuntu-24.04--b Release -e OFF -C'
          path: ./
      - name: Run benchexec (full, budget ${{ matrix.budget }}s)
        env:
          TIMEOUT: ${{ matrix.budget }}
          ESBMC_OPTS: ''
        # NOTE: scripts/benchexec.sh deletes ./esbmc-src after setup, so any
        # subsequent step that needs the source tree must not rely on it.
        run: ./esbmc-src/scripts/benchexec.sh -f
      - name: Extract Statistics block
        # Stop at the `Score:` line to match today's hand-edited format
        # exactly; trailing URLs/blank lines in the benchexec report are
        # intentionally dropped. Append a link back to this run for
        # traceability (humans used to paste this by hand).
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/stats-out"
          src=$(ls $HOME/esbmc-output/*results*.txt | head -n1)
          dst="$GITHUB_WORKSPACE/stats-out/${{ matrix.file }}"
          awk '/^Statistics:/{p=1} p{print; if (/^[[:space:]]+Score:/) exit}' \
            "$src" > "$dst"
          printf '\n%s/%s/actions/runs/%s\n' \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" >> "$dst"
          cat "$dst"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: stats-${{ matrix.budget }}s
          path: stats-out/${{ matrix.file }}
          if-no-files-found: error

  open-pr:
    runs-on: ubuntu-latest
    needs: run
    if: ${{ needs.run.result == 'success' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts/
      - name: Assemble stats files
        run: |
          set -euo pipefail
          for d in artifacts/stats-*; do
            cp -v "$d"/* scripts/competitions/svcomp/
          done
          ls -la scripts/competitions/svcomp/stats-*
      # NOTE: PRs opened with the default GITHUB_TOKEN do NOT trigger
      # downstream workflows (GitHub security policy). Merging this PR
      # will therefore not auto-fire `sv-comp-history-graph.yml`; either
      # supply a fine-scoped PAT via `token:` here, or manually dispatch
      # that workflow after merge.
      - uses: peter-evans/create-pull-request@v8.1.1
        with:
          commit-message: '[sv-comp] auto-refresh stats-*'
          title: '[sv-comp] auto-refresh stats from benchexec run'
          body: |
            Automated quarterly refresh of
            `scripts/competitions/svcomp/stats-*` from a full benchexec
            run of the SV-Benchmarks `${{ inputs.svbenchmarks || 'main' }}`
            ref. Review the Score numbers before merging.
          branch: auto/sv-comp-stats-refresh
          add-paths: scripts/competitions/svcomp/stats-*
          delete-branch: true
          labels: |
            automation
            sv-comp-stats-refresh
