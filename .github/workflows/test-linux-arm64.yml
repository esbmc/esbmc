name: Test Linux ARM64

on:
  push:
    branches:
      - fix/arm-sve-builtin-types
  pull_request:
    branches:
      - fix/arm-sve-builtin-types

jobs:
  build-linux-arm64:
    name: Linux ARM64 build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-16 clang-16 libclang-16-dev libclang-cpp16-dev

      - name: Build ESBMC
        run: ./scripts/build.sh -b DebugOpt -S OFF -e OFF
