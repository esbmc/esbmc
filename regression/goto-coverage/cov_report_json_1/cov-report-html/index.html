<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ESBMC Coverage Report</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, sans-serif;
       background: #f5f5f5; color: #333; padding: 20px; }
a { color: #0366d6; text-decoration: none; }
a:hover { text-decoration: underline; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.header h1 { font-size: 20px; }
.badge { background: #0366d6; color: #fff; padding: 3px 10px; border-radius: 12px;
         font-size: 13px; }

/* summary bar */
.summary-bar { position: relative; background: #e74c3c; border-radius: 4px;
               height: 24px; margin-bottom: 20px; overflow: hidden; }
.summary-fill { background: #27ae60; height: 100%; transition: width .3s; }
.summary-text { position: absolute; top: 0; left: 0; right: 0; text-align: center;
                line-height: 24px; font-size: 13px; font-weight: 600; color: #fff; }

/* file table */
.file-table { width: 100%; border-collapse: collapse; background: #fff;
              border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.file-table th { background: #fafafa; text-align: left; padding: 8px 12px;
                 font-size: 13px; border-bottom: 2px solid #eee; }
.file-table td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid #eee; }
.file-table .cov { color: #27ae60; font-weight: 600; }
.file-table .uncov { color: #e74c3c; font-weight: 600; }
.bar-col { width: 160px; }
.bar { background: #e74c3c; border-radius: 3px; height: 14px; overflow: hidden; }
.bar-fill { background: #27ae60; height: 100%; }

/* source table */
.source-table { width: 100%; border-collapse: collapse; background: #fff;
                box-shadow: 0 1px 3px rgba(0,0,0,.1); font-size: 13px; }
.source-table th { background: #fafafa; text-align: left; padding: 4px 8px;
                   border-bottom: 2px solid #eee; font-size: 12px; }
.source-table td { padding: 0 8px; vertical-align: top; border-bottom: 1px solid #f0f0f0; }
.ln-col { width: 55px; text-align: right; color: #999; user-select: none; }
.ann-col { width: 220px; }
pre { margin: 0; white-space: pre-wrap; word-break: break-all; font-family: "SFMono-Regular",
      Consolas, "Liberation Mono", Menlo, monospace; font-size: 13px; line-height: 20px; }
.line-cov { background: #e6ffec; }
.line-uncov { background: #ffebe9; }
.ann { font-size: 11px; line-height: 18px; }
.ann-cov { color: #27ae60; }
.ann-uncov { color: #e74c3c; }

.legend { margin-bottom: 12px; font-size: 13px; }
.leg-cov { color: #27ae60; margin-right: 16px; }
.leg-uncov { color: #e74c3c; }

.footer { margin-top: 24px; font-size: 12px; color: #999; text-align: center; }

</style>
</head>
<body>
<div class="header">
  <h1>ESBMC Coverage Report</h1>
  <span class="badge">branch coverage</span>
</div>

<div class="summary-bar">
  <div class="summary-fill" style="width:50.0%"></div>
  <span class="summary-text">1/2 (50.0%)</span>
</div>

<table class="file-table">
<thead>
<tr>
  <th>Source File</th>
  <th>Claims</th>
  <th>Covered</th>
  <th>Uncovered</th>
  <th>Coverage</th>
  <th class="bar-col">Bar</th>
</tr>
</thead>
<tbody>
<tr>
  <td><a href="main.c.html">main.c</a></td>
  <td>2</td>
  <td class="cov">1</td>
  <td class="uncov">1</td>
  <td>50.0%</td>
  <td class="bar-col"><div class="bar"><div class="bar-fill" style="width:50.0%"></div></div></td>
</tr>
</tbody>
</table>

<div class="footer">Generated by ESBMC cov-report.py</div>
</body>
</html>
